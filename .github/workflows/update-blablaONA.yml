name: Ažuriraj blablaONA M3U
on:
  schedule:
    # 🕐 8:00 CET = 7:00 UTC
    - cron: '0 7 * * *'   
    # 🕛 12:00 CET = 11:00 UTC  
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    # PUPPETEER SPECIFIČNI SETUP
    - name: Instaliraj Chrome i Puppeteer
      run: |
        npm init -y
        npm install puppeteer cheerio axios
        npx puppeteer browsers install chrome
    
    - name: Generiraj M3U s Puppeteer
      run: node update-m3u.js
    
    - name: Commit i push
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "blablaONA ažurirano: ${{ github.run_id }}"
        file_pattern: blablaONA.m3u
